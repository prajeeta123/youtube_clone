<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Channel page on StreamVibe — Browse videos from your favorite creators.">
    <title>Channel — StreamVibe</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c3aed'/><polygon points='12,8 26,16 12,24' fill='white'/></svg>" type="image/svg+xml">
</head>
<body>

    <!-- ============ NAVBAR ============ -->
    <nav class="navbar-custom d-flex align-items-center" id="navbar">
        <div class="d-flex align-items-center gap-2">
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <i class="bi bi-list"></i>
            </button>
            <a href="index.html" class="navbar-brand-custom">
                <div class="logo-icon">
                    <i class="bi bi-play-fill"></i>
                </div>
                <span>StreamVibe</span>
            </a>
        </div>

        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off" aria-label="Search videos">
                <button class="search-btn" id="searchBtn" aria-label="Search">
                    <i class="bi bi-search"></i>
                </button>
            </div>
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>

        <button class="voice-search-btn" aria-label="Voice search">
            <i class="bi bi-mic-fill"></i>
        </button>

        <div class="nav-icons">
            <button class="nav-icon-btn d-mobile-none" aria-label="Create" title="Create">
                <i class="bi bi-camera-video"></i>
            </button>
            <button class="nav-icon-btn" aria-label="Notifications" title="Notifications">
                <i class="bi bi-bell"></i>
                <span class="badge-dot"></span>
            </button>
            <button class="nav-icon-btn theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light mode">
                <i class="bi bi-sun-fill" id="themeIcon"></i>
            </button>
            <img class="profile-img" src="https://picsum.photos/seed/myavatar/100/100" alt="Profile" title="Your profile">
        </div>
    </nav>

    <!-- ============ SIDEBAR OVERLAY ============ -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <a href="index.html" class="sidebar-item">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="explore.html" class="sidebar-item">
                <i class="bi bi-compass"></i>
                <span>Explore</span>
            </a>
            <a href="shorts.html" class="sidebar-item">
                <i class="bi bi-collection-play"></i>
                <span>Shorts</span>
            </a>
            <a href="subscriptions.html" class="sidebar-item">
                <i class="bi bi-broadcast"></i>
                <span>Subscriptions</span>
            </a>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">You</div>
            <a href="#" class="sidebar-item">
                <i class="bi bi-person-circle"></i>
                <span>Your Channel</span>
            </a>
            <a href="history.html" class="sidebar-item">
                <i class="bi bi-clock-history"></i>
                <span>History</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-music-note-list"></i>
                <span>Playlists</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-clock"></i>
                <span>Watch Later</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-hand-thumbs-up"></i>
                <span>Liked Videos</span>
            </a>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">Explore</div>
            <a href="#" class="sidebar-item">
                <i class="bi bi-fire"></i>
                <span>Trending</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-controller"></i>
                <span>Gaming</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-music-note-beamed"></i>
                <span>Music</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-film"></i>
                <span>Movies</span>
            </a>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content" id="mainContent">
        <!-- Channel Banner -->
        <div class="channel-banner" id="channelBanner">
            <img src="" alt="Channel banner">
        </div>

        <!-- Channel Header -->
        <div class="channel-header" id="channelHeader">
            <!-- Rendered by JS -->
        </div>

        <!-- Channel Tabs -->
        <div class="channel-tabs" id="channelTabs">
            <button class="channel-tab active" data-tab="videos">Videos</button>
            <button class="channel-tab" data-tab="shorts">Shorts</button>
            <button class="channel-tab" data-tab="playlists">Playlists</button>
            <button class="channel-tab" data-tab="community">Community</button>
            <button class="channel-tab" data-tab="about">About</button>
        </div>

        <!-- Channel Videos Grid -->
        <div class="video-grid" id="channelVideoGrid">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- ============ TOAST CONTAINER ============ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============ SCRIPTS ============ -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data/videos.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/search.js"></script>

    <script>
        /*
         * channel.js (inline) - Channel Page Logic
         * Handles: channel info display, channel video grid, tab switching
         */

        $(document).ready(function () {
            const urlParams = new URLSearchParams(window.location.search);
            const channelName = urlParams.get('channel');

            if (!channelName) {
                window.location.href = 'index.html';
                return;
            }

            // Get all videos from this channel
            const channelVideos = VIDEOS.filter(v => v.channel === channelName);

            if (channelVideos.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            const firstVideo = channelVideos[0];

            // Update page title
            document.title = `${channelName} — StreamVibe`;

            // Render channel banner
            const bannerSeed = channelName.replace(/\s/g, '').toLowerCase();
            document.getElementById('channelBanner').querySelector('img').src =
                `https://picsum.photos/seed/${bannerSeed}banner/1200/300`;

            // Render channel header
            const subCount = Math.floor(Math.random() * 9000 + 500) + 'K';
            const videoCount = channelVideos.length;

            document.getElementById('channelHeader').innerHTML = `
                <img class="channel-pfp" src="${firstVideo.channelImg}" alt="${channelName}">
                <div class="channel-header-info">
                    <h1>${channelName}</h1>
                    <div class="channel-stats">
                        @${channelName.replace(/[^a-zA-Z0-9]/g, '').toLowerCase()} • ${subCount} subscribers • ${videoCount} videos
                    </div>
                    <div class="channel-stats" style="margin-top:4px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;">
                        Welcome to ${channelName}! We create amazing content for you.
                    </div>
                </div>
                <div class="channel-header-buttons">
                    <button class="subscribe-btn" id="channelSubscribeBtn">Subscribe</button>
                    <button class="join-btn">Join</button>
                </div>
            `;

            // Render channel videos
            renderChannelVideos(channelVideos);

            // Tab switching
            $('.channel-tab').on('click', function () {
                $('.channel-tab').removeClass('active');
                $(this).addClass('active');

                const tab = $(this).data('tab');
                const grid = document.getElementById('channelVideoGrid');

                if (tab === 'videos') {
                    renderChannelVideos(channelVideos);
                } else if (tab === 'about') {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; max-width: 700px;">
                            <div class="description-box" style="cursor:default;">
                                <h4 style="margin-bottom:12px; font-weight:700;">About ${channelName}</h4>
                                <p style="color: var(--text-secondary); line-height:1.7; margin-bottom:16px;">
                                    Welcome to ${channelName}! We create high-quality content covering the latest
                                    in our field. Subscribe and turn on notifications to never miss an upload.
                                    New videos every week!
                                </p>
                                <div style="display:flex; flex-wrap:wrap; gap:20px; color:var(--text-muted); font-size:0.88rem;">
                                    <div><i class="bi bi-people-fill me-1"></i> ${subCount} subscribers</div>
                                    <div><i class="bi bi-collection-play-fill me-1"></i> ${videoCount} videos</div>
                                    <div><i class="bi bi-calendar3 me-1"></i> Joined Jan 2020</div>
                                    <div><i class="bi bi-eye-fill me-1"></i> ${Math.floor(Math.random() * 50 + 5)}M total views</div>
                                    <div><i class="bi bi-globe me-1"></i> India</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <i class="bi bi-folder2-open"></i>
                            <h3>Nothing here yet</h3>
                            <p>This channel hasn't added any ${tab} yet.</p>
                        </div>
                    `;
                }
            });

            // Subscribe button
            $(document).on('click', '#channelSubscribeBtn', function () {
                if ($(this).hasClass('subscribed')) {
                    $(this).removeClass('subscribed').text('Subscribe');
                    showToast('Unsubscribed');
                } else {
                    $(this).addClass('subscribed').text('Subscribed ✓');
                    showToast('Subscribed! 🎉');
                }
            });

            // Click on video card navigates to watch page
            $(document).on('click', '.video-card', function (e) {
                if ($(e.target).closest('a').length > 0) return;
                const videoId = $(this).data('video-id');
                if (videoId) {
                    window.location.href = `watch.html?v=${videoId}`;
                }
            });

            // Setup sidebar + theme
            setupSidebar();
            setupThemeToggle();
            initSearch();
        });

        function renderChannelVideos(videos) {
            const grid = document.getElementById('channelVideoGrid');

            let html = '';
            videos.forEach(video => {
                const isLive = video.duration === 'LIVE';
                html += `
                    <div class="video-card" data-video-id="${video.id}">
                        <div class="thumbnail-wrapper">
                            <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                            <video class="video-preview" src="${video.videoUrl || 'https://www.w3schools.com/html/mov_bbb.mp4'}" muted loop playsinline></video>
                            <span class="duration-badge ${isLive ? 'live' : ''}">${video.duration}</span>
                        </div>
                        <div class="video-info">
                            <div class="video-details" style="margin-left:0;">
                                <div class="video-title">${video.title}</div>
                                <div class="video-meta">
                                    <span>${formatViews(getViewCount(video.id))}</span>
                                    <span>${video.uploadTime}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;

            // Animate cards in
            $(grid).find('.video-card').each(function (i) {
                $(this).css({ 'opacity': 0, 'transform': 'translateY(20px)' });
                $(this).delay(i * 60).animate(
                    { opacity: 1 },
                    300,
                    function () {
                        $(this).css('transform', 'translateY(0)');
                    }
                );
            });
        }

        // Search redirects to homepage
        function performSearch(query) {
            if (query && query.trim()) {
                window.location.href = `index.html?q=${encodeURIComponent(query.trim())}`;
            }
        }

        function setupSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const overlay = document.getElementById('sidebarOverlay');

            $('#sidebarToggle').on('click', function () {
                if (window.innerWidth <= 992) {
                    $(sidebar).toggleClass('mobile-open');
                    $(overlay).toggleClass('show');
                } else {
                    $(sidebar).toggleClass('collapsed');
                    $(mainContent).toggleClass('expanded');
                }
            });

            $(overlay).on('click', function () {
                $(sidebar).removeClass('mobile-open');
                $(overlay).removeClass('show');
            });

            $(window).on('resize', function () {
                if (window.innerWidth > 992) {
                    $(sidebar).removeClass('mobile-open');
                    $(overlay).removeClass('show');
                }
            });
        }

        function setupThemeToggle() {
            $('#themeToggle').on('click', function () {
                const newTheme = toggleTheme();
                showToast(newTheme === 'dark' ? '🌙 Dark mode enabled' : '☀️ Light mode enabled');
            });
        }
    </script>

</body>
</html>
