        <div class="sidebar-section">

            <a href="#" class="sidebar-item">

            <a href="history.html" class="sidebar-item active">

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content" id="mainContent">
        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="bi bi-clock-history"></i> Watch History</h1>
            <div class="header-actions">
                <button class="header-action-btn" id="pauseHistoryBtn">
                    <i class="bi bi-pause-circle"></i> Pause History
                </button>
                <button class="header-action-btn danger" id="clearHistoryBtn">
                    <i class="bi bi-trash3"></i> Clear All
                </button>
            </div>
        </div>

        <!-- History List -->
        <div id="historyList">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- ============ TOAST CONTAINER ============ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============ SCRIPTS ============ -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data/videos.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/search.js"></script>

    <script>
        /*
         * history page logic (inline)
         * Renders watch history from localStorage
         */

        $(document).ready(function () {
            renderHistory();
            setupSidebar();
            setupThemeToggle();
            initSearch();

            // Clear all history
            $('#clearHistoryBtn').on('click', function () {
                if (confirm('Are you sure you want to clear your entire watch history?')) {
                    clearHistory();
                    renderHistory();
                    showToast('Watch history cleared');
                }
            });

            // Pause history toggle
            let historyPaused = false;
            $('#pauseHistoryBtn').on('click', function () {
                historyPaused = !historyPaused;
                if (historyPaused) {
                    $(this).html('<i class="bi bi-play-circle"></i> Resume History');
                    showToast('Watch history paused');
                } else {
                    $(this).html('<i class="bi bi-pause-circle"></i> Pause History');
                    showToast('Watch history resumed');
                }
            });

            // Remove single history item
            $(document).on('click', '.history-remove-btn', function (e) {
                e.stopPropagation();
                const videoId = $(this).data('video-id');
                removeFromHistory(videoId);
                $(this).closest('.history-item').slideUp(300, function () {
                    $(this).remove();
                    // Check if list is now empty
                    if ($('#historyList .history-item').length === 0) {
                        renderHistory();
                    }
                });
                showToast('Removed from history');
            });

            // Click on history item to watch
            $(document).on('click', '.history-item', function (e) {
                if ($(e.target).closest('button').length > 0) return;
                if ($(e.target).closest('a').length > 0) return;
                const videoId = $(this).data('video-id');
                if (videoId) {
                    window.location.href = `watch.html?v=${videoId}`;
                }
            });
        });

        function renderHistory() {
            const container = document.getElementById('historyList');
            const history = getHistory();

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-clock-history"></i>
                        <h3>No watch history</h3>
                        <p>Videos you watch will appear here. Start exploring!</p>
                        <a href="index.html" class="action-btn ripple" style="display:inline-flex; margin-top:16px; text-decoration:none;">
                            <i class="bi bi-house-door"></i> Go Home
                        </a>
                    </div>
                `;
                return;
            }

            // Group history by date
            const today = new Date();
            const groups = { 'Today': [], 'Yesterday': [], 'This Week': [], 'Earlier': [] };

            history.forEach(item => {
                const video = getVideoById(item.videoId);
                if (!video) return;

                const watchedDate = new Date(item.watchedAt);
                const diffDays = Math.floor((today - watchedDate) / (1000 * 60 * 60 * 24));

                if (diffDays === 0) {
                    groups['Today'].push({ video, watchedAt: item.watchedAt });
                } else if (diffDays === 1) {
                    groups['Yesterday'].push({ video, watchedAt: item.watchedAt });
                } else if (diffDays < 7) {
                    groups['This Week'].push({ video, watchedAt: item.watchedAt });
                } else {
                    groups['Earlier'].push({ video, watchedAt: item.watchedAt });
                }
            });

            let html = '';
            for (const [groupName, items] of Object.entries(groups)) {
                if (items.length === 0) continue;

                html += `<h3 style="font-size: 1rem; font-weight: 600; margin: 20px 0 12px; color: var(--text-secondary);">${groupName}</h3>`;

                items.forEach(({ video, watchedAt }) => {
                    const isLive = video.duration === 'LIVE';
                    html += `
                        <div class="history-item" data-video-id="${video.id}" style="cursor:pointer;">
                            <div class="history-thumb">
                                <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                                <video class="video-preview" src="${video.videoUrl || 'https://www.w3schools.com/html/mov_bbb.mp4'}" muted loop playsinline></video>
                                <span class="duration-badge ${isLive ? 'live' : ''}">${video.duration}</span>
                            </div>
                            <div class="history-info">
                                <div class="video-title">${video.title}</div>
                                <a href="channel.html?channel=${encodeURIComponent(video.channel)}" class="video-channel">${video.channel}</a>
                                <div class="video-meta">
                                    <span>${formatViews(getViewCount(video.id))}</span>
                                    <span>${video.uploadTime}</span>
                                </div>
                                <div class="video-meta" style="margin-top:6px;">
                                    <span style="color:var(--text-muted);">${video.description.substring(0, 120)}...</span>
                                </div>
                            </div>
                            <button class="history-remove-btn" data-video-id="${video.id}" title="Remove from history">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                    `;
                });
            }

            container.innerHTML = html;

            // Animate items in
            $(container).find('.history-item').each(function (i) {
                $(this).css({ 'opacity': 0, 'transform': 'translateY(10px)' });
                $(this).delay(i * 40).animate(
                    { opacity: 1 },
                    250,
                    function () {
                        $(this).css('transform', 'translateY(0)');
                    }
                );
            });
        }

        // Search redirects to homepage
        function performSearch(query) {
            if (query && query.trim()) {
                window.location.href = `index.html?q=${encodeURIComponent(query.trim())}`;
            }
        }

        function setupSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const overlay = document.getElementById('sidebarOverlay');

            $('#sidebarToggle').on('click', function () {
                if (window.innerWidth <= 992) {
                    $(sidebar).toggleClass('mobile-open');
                    $(overlay).toggleClass('show');
                } else {
                    $(sidebar).toggleClass('collapsed');
                    $(mainContent).toggleClass('expanded');
                }
            });

            $(overlay).on('click', function () {
                $(sidebar).removeClass('mobile-open');
                $(overlay).removeClass('show');
            });

            $(window).on('resize', function () {
                if (window.innerWidth > 992) {
                    $(sidebar).removeClass('mobile-open');
                    $(overlay).removeClass('show');
                }
            });
        }

        function setupThemeToggle() {
            $('#themeToggle').on('click', function () {
                const newTheme = toggleTheme();
                showToast(newTheme === 'dark' ? '🌙 Dark mode enabled' : '☀️ Light mode enabled');
            });
        }
    </script>
