<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StreamVibe Shorts - Watch vertical short videos.">
    <title>Shorts — StreamVibe</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c3aed'/><polygon points='12,8 26,16 12,24' fill='white'/></svg>" type="image/svg+xml">

    <style>
        .shorts-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: calc(100vh - var(--navbar-height));
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            padding: 20px 0;
            gap: 20px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .shorts-container::-webkit-scrollbar {
            display: none;
        }
        .short-item {
            scroll-snap-align: start;
            width: 100%;
            max-width: 400px;
            height: calc(100vh - var(--navbar-height) - 40px);
            min-height: 500px;
            background: var(--bg-card);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            box-shadow: var(--shadow-lg);
        }
        .short-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .short-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            padding-right: 70px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            pointer-events: none;
        }
        .short-actions {
            position: absolute;
            right: 12px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .short-action-btn {
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .short-action-btn:hover {
            background: rgba(0,0,0,0.8);
        }
        .short-action-btn i {
            font-size: 1.5rem;
        }
        .short-action-btn span {
            font-size: 0.75rem;
            margin-top: 4px;
            pointer-events: none;
        }
        .short-channel-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .short-channel-info img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            pointer-events: auto;
        }
        .short-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .main-content { padding-top: var(--navbar-height); }

        @media (max-width: 768px) {
            .main-content { padding: 0 !important; margin: 0 !important; }
            .shorts-container { height: 100vh; padding: 0; gap: 0; }
            .short-item { max-width: 100%; height: 100vh; border-radius: 0; }
            .navbar-custom { display: none !important; }
            .sidebar { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- ============ NAVBAR ============ -->
    <nav class="navbar-custom d-flex align-items-center" id="navbar">
        <div class="d-flex align-items-center gap-2">
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <i class="bi bi-list"></i>
            </button>
            <a href="index.html" class="navbar-brand-custom">
                <div class="logo-icon">
                    <i class="bi bi-play-fill"></i>
                </div>
                <span>StreamVibe</span>
            </a>
        </div>

        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off" aria-label="Search videos">
                <button class="search-btn" id="searchBtn" aria-label="Search">
                    <i class="bi bi-search"></i>
                </button>
            </div>
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>

        <button class="voice-search-btn" aria-label="Voice search">
            <i class="bi bi-mic-fill"></i>
        </button>

        <div class="nav-icons">
            <button class="nav-icon-btn d-mobile-none" aria-label="Create" title="Create">
                <i class="bi bi-camera-video"></i>
            </button>
            <button class="nav-icon-btn" aria-label="Notifications" title="Notifications">
                <i class="bi bi-bell"></i>
                <span class="badge-dot"></span>
            </button>
            <button class="nav-icon-btn theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light mode">
                <i class="bi bi-sun-fill" id="themeIcon"></i>
            </button>
            <img class="profile-img" src="https://picsum.photos/seed/myavatar/100/100" alt="Profile" title="Your profile">
        </div>
    </nav>

    <!-- ============ SIDEBAR OVERLAY ============ -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-section">
            <a href="index.html" class="sidebar-item">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="explore.html" class="sidebar-item">
                <i class="bi bi-compass"></i>
                <span>Explore</span>
            </a>
            <a href="shorts.html" class="sidebar-item active">
                <i class="bi bi-collection-play"></i>
                <span>Shorts</span>
            </a>
            <a href="subscriptions.html" class="sidebar-item">
                <i class="bi bi-broadcast"></i>
                <span>Subscriptions</span>
            </a>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">You</div>
            <a href="#" class="sidebar-item">
                <i class="bi bi-person-circle"></i>
                <span>Your Channel</span>
            </a>
            <a href="history.html" class="sidebar-item">
                <i class="bi bi-clock-history"></i>
                <span>History</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-music-note-list"></i>
                <span>Playlists</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-clock"></i>
                <span>Watch Later</span>
            </a>
            <a href="#" class="sidebar-item">
                <i class="bi bi-hand-thumbs-up"></i>
                <span>Liked Videos</span>
            </a>
        </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="main-content expanded" id="mainContent" style="padding-top: var(--navbar-height);">
        <div class="shorts-container" id="shortsContainer">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- ============ TOAST CONTAINER ============ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============ SCRIPTS ============ -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data/videos.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/search.js"></script>

    <script>
        $(document).ready(function () {
            setupSidebar();
            setupThemeToggle();
            initSearch();
            renderShorts();
        });

        function renderShorts() {
            const container = document.getElementById('shortsContainer');
            // Mix up some videos to act as shorts
            const shorts = [...VIDEOS].sort(() => 0.5 - Math.random()).slice(0, 10);
            
            // A sample public video URL for some shorts
            const sampleVideoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";
            
            let html = '';
            shorts.forEach((video, index) => {
                const mediaElement = `<video class="short-video" src="${video.videoUrl || sampleVideoUrl}" autoplay loop muted playsinline style="object-fit: cover;"></video>`;
                    
                html += `
                    <div class="short-item">
                        ${mediaElement}
                        
                        <div class="short-overlay">
                            <div class="short-channel-info">
                                <a href="channel.html?channel=${encodeURIComponent(video.channel)}"><img src="${video.channelImg}" alt=""></a>
                                <div>
                                    <div style="font-weight:600; font-size:0.95rem;">@${video.channel.replace(/\s/g,'')}</div>
                                </div>
                                <button class="btn btn-sm btn-light rounded-pill ms-2" style="font-weight:600; padding:2px 12px; pointer-events:auto;" onclick="showToast('Subscribed!')">Subscribe</button>
                            </div>
                            <div class="short-title">${video.title}</div>
                        </div>
                        
                        <div class="short-actions">
                            <button class="short-action-btn" onclick="showToast('Liked!')">
                                <i class="bi bi-hand-thumbs-up-fill"></i>
                                <span>${Math.floor(Math.random() * 900 + 100)}K</span>
                            </button>
                            <button class="short-action-btn" onclick="showToast('Disliked')">
                                <i class="bi bi-hand-thumbs-down-fill"></i>
                                <span>Dislike</span>
                            </button>
                            <button class="short-action-btn" onclick="showToast('Comments opening...')">
                                <i class="bi bi-chat-fill"></i>
                                <span>${Math.floor(Math.random() * 50 + 5)}K</span>
                            </button>
                            <button class="short-action-btn" onclick="showToast('Link copied!')">
                                <i class="bi bi-share-fill"></i>
                                <span>Share</span>
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function performSearch(query) {
            if (query && query.trim()) {
                window.location.href = `index.html?q=${encodeURIComponent(query.trim())}`;
            }
        }

        function setupSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const overlay = document.getElementById('sidebarOverlay');

            $('#sidebarToggle').on('click', function () {
                if (window.innerWidth <= 992) {
                    $(sidebar).toggleClass('mobile-open');
                    $(overlay).toggleClass('show');
                } else {
                    $(sidebar).toggleClass('collapsed');
                    $(mainContent).toggleClass('expanded');
                }
            });

            $(overlay).on('click', function () {
                $(sidebar).removeClass('mobile-open');
                $(overlay).removeClass('show');
            });

            $(window).on('resize', function () {
                if (window.innerWidth > 992) {
                    $(sidebar).removeClass('mobile-open');
                    $(overlay).removeClass('show');
                }
            });
        }

        function setupThemeToggle() {
            $('#themeToggle').on('click', function () {
                const newTheme = toggleTheme();
                showToast(newTheme === 'dark' ? '🌙 Dark mode enabled' : '☀️ Light mode enabled');
            });
        }
    </script>
</body>
</html>
